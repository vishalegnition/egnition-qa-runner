name: Run QA Browser Tests

on:
  workflow_dispatch:
    inputs:
      app:
        description: 'App identifier (br, oosp, mssp, ol)'
        required: true
        type: string
      cycle_id:
        description: 'Zephyr test cycle key (e.g. BR-R104 for BestSellers reSort)'
        required: true
        type: string
      smoke_test:
        description: 'Run only the first test case (pipeline smoke test)'
        required: false
        type: boolean
        default: true

jobs:
  run-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run test cycle
        env:
          APP: ${{ inputs.app }}
          CYCLE_ID: ${{ inputs.cycle_id }}
          SMOKE_TEST: ${{ inputs.smoke_test }}
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
          SHOPIFY_ADMIN_EMAIL: ${{ secrets.SHOPIFY_ADMIN_EMAIL }}
          SHOPIFY_ADMIN_PASSWORD: ${{ secrets.SHOPIFY_ADMIN_PASSWORD }}
          SHOPIFY_2FA_SECRET: ${{ secrets.SHOPIFY_2FA_SECRET }}
          ZEPHYR_API_TOKEN: ${{ secrets.ZEPHYR_API_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: node runner/index.js

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qa-screenshots-${{ inputs.cycle_id }}
          path: screenshots/
          if-no-files-found: ignore
